name: PR checks

# Run the three JVM pipeline gates on every pull request targeting main.
# Device-gated connectedAndroidTest is NOT run here (no CI emulator — architecture decision 8);
# it stays a manual on-device step.
on:
  pull_request:
    branches: [main]

# Least privilege: the checks only read the repository.
permissions:
  contents: read

jobs:
  jvm-gates:
    runs-on: ubuntu-latest
    steps:
      # No submodules: .ai-pm/tooling is a private SSH submodule the Gradle build does not use.
      # checkout@v4 defaults to submodules: false — keep it that way (a recursive fetch has no key in CI).
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM gates (test + ktlintCheck + lint)
        run: ./gradlew test ktlintCheck lint
