name: PR checks

# Minimal CI during active development: only the review-beat quality tools (secret-scan).
# All build-beat tools (test, ktlint, lint) run locally before pushing:
#   node .ai-dev/quality/run.mjs build
on:
  pull_request:
    branches: [main]

# Least privilege: the checks only read the repository.
permissions:
  contents: read

jobs:
  review-gates:
    runs-on: ubuntu-latest
    env:
      # Pinned gitleaks release. Bump deliberately (and re-verify the URL) — never float.
      GITLEAKS_VERSION: '8.30.1'
    steps:
      # fetch-depth: 0 — gitleaks (via the quality runner) must see the FULL
      # commit history, not just the tip working tree.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Download pinned gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Run the whole review-beat quality suite through the runner — not a
      # hand-picked tool. Adding a tool to the review beat in tools.json
      # automatically reaches CI with zero workflow edits.
      - name: Run review-beat quality tools
        run: node .ai-dev/quality/run.mjs review
