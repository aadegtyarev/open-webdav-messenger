name: PR checks

# Run the three JVM pipeline gates on every pull request targeting main.
# Device-gated connectedAndroidTest is NOT run here (no CI emulator — architecture decision 8);
# it stays a manual on-device step.
on:
  pull_request:
    branches: [main]

# Least privilege: the checks only read the repository.
permissions:
  contents: read

jobs:
  jvm-gates:
    runs-on: ubuntu-latest
    steps:
      # No submodules: the tooling is vendored into .ai-dev/tooling/ (the Gradle build does not reference it).
      # checkout@v4 defaults to submodules: false — keep it that way (a recursive fetch has no key in CI).
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run JVM gates (test + ktlintCheck + lint)
        run: ./gradlew test ktlintCheck lint

  # SC21: no secret material in the source tree OR anywhere in git history.
  # Runs in parallel with the JVM gates (separate job). gitleaks is fetched as a
  # version-pinned release binary rather than via gitleaks/gitleaks-action — the
  # action has org-licensing nuances; a pinned download keeps the gate simple and
  # supply-chain-explicit.
  secret-scan:
    runs-on: ubuntu-latest
    env:
      # Pinned gitleaks release. Bump deliberately (and re-verify the URL) — never float.
      GITLEAKS_VERSION: '8.30.1'
    steps:
      # fetch-depth: 0 — gitleaks must see the FULL commit history, not just the tip
      # working tree, so a secret that was committed and later deleted is still caught.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download pinned gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      # detect over the repo + its commits; --redact keeps any match out of the logs in
      # plaintext; --exit-code 1 fails the PR on ANY finding (clean tree → exit 0 → green).
      - name: Scan repo + git history for secrets
        run: ./gitleaks detect --source . --redact --verbose --exit-code 1
