name: PR checks

# JVM gates (ktlintCheck + lint) run locally during active development — not in CI.
# Run before pushing: ./gradlew ktlintCheck lint
on:
  pull_request:
    branches: [main]

# Least privilege: the checks only read the repository.
permissions:
  contents: read

jobs:
  # SC21: no secret material in the source tree OR anywhere in git history.
  # gitleaks is fetched as a version-pinned release binary rather than via
  # gitleaks/gitleaks-action — the action has org-licensing nuances; a pinned
  # download keeps the gate simple and supply-chain-explicit.
  secret-scan:
    runs-on: ubuntu-latest
    env:
      # Pinned gitleaks release. Bump deliberately (and re-verify the URL) — never float.
      GITLEAKS_VERSION: '8.30.1'
    steps:
      # fetch-depth: 0 — gitleaks must see the FULL commit history, not just the tip
      # working tree, so a secret that was committed and later deleted is still caught.
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download pinned gitleaks
        run: |
          set -euo pipefail
          url="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$url" -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          ./gitleaks version

      # detect over the repo + its commits; --redact keeps any match out of the logs in
      # plaintext; --exit-code 1 fails the PR on ANY finding (clean tree → exit 0 → green).
      - name: Scan repo + git history for secrets
        run: ./gitleaks detect --source . --redact --verbose --exit-code 1
