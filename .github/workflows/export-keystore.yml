name: Export keystore once
on: workflow_dispatch
jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
      - name: Write signing properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" > signing.properties
          echo "KEY_ALIAS=$KEY_ALIAS" >> signing.properties
          echo "KEY_PASSWORD=$KEY_PASSWORD" >> signing.properties
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: release-keystore
          path: |
            release.keystore
            signing.properties
